<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Nexus mark: a hub linked to six orbiting nodes. Original geometry. -->
  <defs>
    <linearGradient id="nx" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b8def"/>
      <stop offset="0.5" stop-color="#7a5cf0"/>
      <stop offset="1" stop-color="#22c7c0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f1117"/>
  <g stroke="url(#nx)" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <line x1="32" y1="32" x2="32" y2="13"/>
    <line x1="32" y1="32" x2="48.5" y2="22"/>
    <line x1="32" y1="32" x2="48.5" y2="42"/>
    <line x1="32" y1="32" x2="32" y2="51"/>
    <line x1="32" y1="32" x2="15.5" y2="42"/>
    <line x1="32" y1="32" x2="15.5" y2="22"/>
  </g>
  <g fill="url(#nx)">
    <circle cx="32" cy="13" r="4.5"/>
    <circle cx="48.5" cy="22" r="4.5"/>
    <circle cx="48.5" cy="42" r="4.5"/>
    <circle cx="32" cy="51" r="4.5"/>
    <circle cx="15.5" cy="42" r="4.5"/>
    <circle cx="15.5" cy="22" r="4.5"/>
  </g>
  <circle cx="32" cy="32" r="7.5" fill="#a9c4ff"/>
</svg>
